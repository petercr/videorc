appId: dev.theorcdev.videorc
productName: Videorc
artifactName: ${productName}-${version}-${os}-${arch}.${ext}
asar: true
npmRebuild: false
publish: null

directories:
  buildResources: build-resources
  output: release

files:
  - out/**/*
  - package.json

# Shared across platforms. Platform-specific resources live under mac:/win:
# because electron-builder CONCATENATES global + platform extraResources
# (it does not override) — a global entry with a mac-only path breaks the
# Windows build and vice versa.
extraResources:
  - from: src/renderer/src/assets/videorc-logo.png
    to: videorc-logo.png

mac:
  category: public.app-category.video
  extraResources:
    - from: ../../target/release/videorc-backend
      to: videorc-backend
      filter:
        - videorc-backend
    - from: ../../target/release/native_preview_host_helper
      to: native_preview_host_helper
      filter:
        - native_preview_host_helper
    - from: ../../vendor/ffmpeg/current
      to: ffmpeg
      filter:
        - bin/ffmpeg
        - NOTICE.txt
        - SOURCE.txt
        - BUILD-CONFIG.txt
        - licenses/**/*
  hardenedRuntime: true
  icon: build-resources/icon.icns
  entitlements: build-resources/entitlements.mac.plist
  entitlementsInherit: build-resources/entitlements.mac.plist
  notarize: true
  extendInfo:
    NSCameraUsageDescription: Videorc uses the camera for creator overlays when you select a camera source.
    NSMicrophoneUsageDescription: Videorc uses the microphone when you select a microphone for recording or streaming.
    NSScreenCaptureDescription: Videorc captures your screen or selected windows only when you start a recording or stream.
    NSDocumentsFolderUsageDescription: Videorc can save recordings to a folder you choose.
    NSDownloadsFolderUsageDescription: Videorc can save exports to a folder you choose.
  target:
    - dir
    - dmg

# Windows 11 x64. Unsigned for now (internal testing); Authenticode signing is
# Phase 5. The .exe backend and the windows-x64 ffmpeg dir override the
# top-level (macOS) extraResources paths. See docs/windows-port-plan.md.
win:
  icon: build-resources/icon.ico
  extraResources:
    # Host-target build: `pnpm package:backend` on the Windows box puts the
    # exe in target/release/, not target/<triple>/release/.
    - from: ../../target/release/videorc-backend.exe
      to: videorc-backend.exe
    - from: ../../vendor/ffmpeg/windows-x64
      to: ffmpeg
      filter:
        - bin/ffmpeg.exe
        - LICENSE.txt
        - SOURCE.txt
  target:
    - dir
    - nsis

nsis:
  oneClick: false
  perMachine: false
  allowToChangeInstallationDirectory: true
